name: Deploy Validstep Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 5m
          debug: true
          script: |
            set -e
            export PATH=/usr/bin:/usr/local/bin:$PATH

            cd /home/ec2-user/validstep
            git fetch origin main
            git reset --hard origin/main

            cp /home/ec2-user/.secrets/.env.validstep backend/.env
            cd backend
            npm install --omit=dev
            npx prisma migrate deploy

            pm2 reload validstep --update-env
            pm2 reload validstep-worker --update-env
            pm2 save

            echo "✅ Validstep deployed at $(date)"
