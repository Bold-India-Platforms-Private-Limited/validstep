upstream validstep_api {
    least_conn;
    server 127.0.0.1:5001;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.validstep.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.validstep.com;

    # ── SSL (Let's Encrypt via certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.validstep.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.validstep.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.validstep.com/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;

    # ── Security headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                always;
    add_header X-Frame-Options           "DENY"                   always;
    add_header X-XSS-Protection          "1; mode=block"          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Request limits ───────────────────────────────────────────
    client_max_body_size 20M;
    client_body_timeout  30s;
    client_header_timeout 15s;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # ── Proxy to PM2 cluster ─────────────────────────────────────
    location / {
        proxy_pass         http://validstep_api;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";   # keep-alive to upstream

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer tuning for JSON APIs
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 16k;
    }

    # ── Health check endpoint (no logging) ───────────────────────
    location = /health {
        proxy_pass http://validstep_api;
        access_log off;
    }
}
